name: Uppdatera omgångsdata

  on:
    schedule:
      - cron: '0 21 * * *'
    workflow_dispatch:

  jobs:
    update:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checka ut repo
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Sätt upp Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Hämta ny omgångsdata
          run: node scripts/update-data.js

        - name: Committa och pusha om något ändrats
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin
            git reset --soft origin/main
            git add src/data/omgangar.json
            git diff --staged --quiet || git commit -m "Auto: uppdatera omgångsdata"
            git push origin main
