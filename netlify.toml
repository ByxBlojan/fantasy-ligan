[build.environment]
    NODE_VERSION = "20"

  [build]
    command = "npm run build"
    publish = "dist"

  [build.environment]
    NODE_VERSION = "20"

  [[headers]]
    for = "/*.js"
    [headers.values]
      Content-Type = "application/javascript; charset=utf-8"

  [[headers]]
    for = "/*.mjs"
    [headers.values]
      Content-Type = "application/javascript; charset=utf-8"

  [[headers]]
    for = "/assets/*"
    [headers.values]
      Content-Type = "application/javascript; charset=utf-8"
