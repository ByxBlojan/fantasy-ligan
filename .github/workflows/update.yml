name: Uppdatera omgångsdata

on:
  schedule:
    - cron: '0 7 * * *'   # Kör 07:00 UTC (09:00 svensk sommartid) varje dag
  workflow_dispatch:        # Tillåter manuell körning från GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Hämta ny omgångsdata
        run: node scripts/update-data.js

      - name: Committa om det finns ändringar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/omgangar.json
          git diff --cached --quiet || git commit -m "Uppdatera omgångsdata [bot]"
          git push
