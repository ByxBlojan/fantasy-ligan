name: Uppdatera omgångsdata

on:
    schedule:
      - cron: '0 7 * * *'
    workflow_dispatch:

jobs:
    update:
      runs-on: ubuntu-latest
      permissions:
        contents: write
        pages: write
        id-token: write

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Hämta ny omgångsdata
          run: node scripts/update-data.js

        - name: Committa om det finns ändringar
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/omgangar.json
            git diff --cached --quiet || git commit -m "Uppdatera omgångsdata [bot]"
            git push

        - name: Installera beroenden
          run: npm ci

        - name: Bygg appen
          run: npm run build

        - name: Deploya till GitHub Pages
          uses: peaceiris/actions-gh-pages@v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./dist
