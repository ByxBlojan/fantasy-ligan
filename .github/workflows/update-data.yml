name: Uppdatera och deploya fantasy-data

on:
  schedule:
    - cron: '0 19 * * 5,6,0,1'  # Fre/Lör/Sön/Mån kl 21:00 CEST
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installera beroenden
        run: npm ci

      - name: Hämta ny data från API
        run: node scripts/update-data.js

      - name: Commit uppdaterad data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/omgangar.json src/data/spelare.json src/data/meta.json
          git diff --cached --quiet || git commit -m "chore: uppdatera omgångsdata"
          git push

      - name: Bygg projektet
        run: npm run build

      - name: Deploya till GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
